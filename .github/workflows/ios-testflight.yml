name: iOS — Build & Upload to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-upload:
    name: Build IPA & Upload to TestFlight
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "stable"
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: flutter_phr
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: flutter_phr/ios
        run: pod install

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: flutter_phr/ios

      - name: Install Fastlane
        working-directory: flutter_phr/ios
        run: gem install fastlane

      - name: Flutter build iOS (no codesign)
        working-directory: flutter_phr
        run: flutter build ios --release --no-codesign

      - name: Fastlane beta
        working-directory: flutter_phr/ios
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          MATCH_APP_IDENTIFIER: com.infer.care
        run: fastlane beta
