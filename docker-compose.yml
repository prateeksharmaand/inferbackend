version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: phr_postgres
    environment:
      POSTGRES_DB: phr_db
      POSTGRES_USER: phr_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phr_user -d phr_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: phr_backend
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: phr_db
      DB_USER: phr_user
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    restart: unless-stopped

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: phr_whisper
    environment:
      ASR_MODEL: base
      ASR_ENGINE: faster_whisper
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: phr_ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  fhir:
    image: hapiproject/hapi:latest
    container_name: phr_fhir
    environment:
      hapi.fhir.default_encoding: json
      hapi.fhir.fhir_version: R4
      hapi.fhir.allow_external_references: "true"
      hapi.fhir.expunge_enabled: "true"
    volumes:
      - fhir_data:/data/hapi
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: phr_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ssl_certs:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  certbot_www:
  uploads_data:
  logs_data:
  ssl_certs:
  fhir_data:
  ollama_data:
