version: "3.9"

services:
  # ── Redis (queue + cache) ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI admin + monitoring API ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - APP_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --workers 2 --loop asyncio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Crawler workers (scale with --scale worker=N) ──────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    command: python -m app.workers.tasks
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

volumes:
  redis_data:
