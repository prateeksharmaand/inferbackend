<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - EMR System</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a73e8 0%, #1557b0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }
        .login-card {
            background: white;
            border-radius: var(--border-radius);
            padding: 2rem;
            box-shadow: var(--shadow-lg);
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        .login-header p {
            color: var(--neutral-600);
            margin: 0;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--neutral-800);
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--neutral-300);
            border-radius: var(--border-radius);
            font-size: 1rem;
            transition: all 0.2s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            background-color: var(--primary-dark);
            box-shadow: var(--shadow-md);
        }
        .alert {
            padding: 1rem;
            background-color: #fee2e2;
            border: 1px solid var(--error);
            border-radius: var(--border-radius);
            color: var(--error);
            margin-bottom: 1rem;
            display: none;
        }
        .warning-box {
            background: #fef3c7;
            border: 1px solid var(--warning);
            border-radius: var(--border-radius);
            padding: 1rem;
            margin-bottom: 1.5rem;
            color: #92400e;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">InferEMR</div>
                <p>Super Admin Portal</p>
            </div>

            <div class="warning-box">
                ⚠️ Super Admin Access Only
            </div>

            <div class="alert" id="errorAlert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Admin Email</label>
                    <input type="email" id="email" name="email" placeholder="admin@inferemr.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="form-group">
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <input type="checkbox" id="remember" name="remember" style="width: auto;">
                        <label for="remember" style="margin: 0; font-weight: 400;">Remember me</label>
                    </div>
                </div>

                <button type="submit" class="btn-login">Sign In as Admin</button>
            </form>

            <p style="text-align: center; color: var(--neutral-600); font-size: 0.85rem; margin-top: 1.5rem;">
                For clinic access, go to <a href="../public/login.html" style="color: var(--primary); text-decoration: none;">Clinic Login</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const alert = document.getElementById('errorAlert');
            alert.textContent = 'Admin login successful! Redirecting...';
            alert.style.display = 'block';
            alert.style.background = '#c6f6d5';
            alert.style.color = 'var(--success)';
            alert.style.border = '1px solid var(--secondary)';
        });
    </script>
</body>
</html>
