<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Login - EMR System</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }
        .login-card {
            background: white;
            border-radius: var(--border-radius);
            padding: 2rem;
            box-shadow: var(--shadow-lg);
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: #7c3aed;
            margin-bottom: 0.5rem;
        }
        .login-header p {
            color: var(--neutral-600);
            margin: 0;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--neutral-800);
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--neutral-300);
            border-radius: var(--border-radius);
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background-color: #7c3aed;
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        .btn-login:hover {
            background-color: #6d28d9;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">🧪 LabEMR</div>
                <p>Laboratory Management System</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="labId">Laboratory ID</label>
                    <input type="text" id="labId" name="labId" placeholder="LAB-12345" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn-login">Lab Sign In</button>
                <button type="button" class="btn btn-secondary" style="width: 100%;">Forgot Password?</button>
            </form>

            <p style="text-align: center; color: var(--neutral-600); font-size: 0.85rem; margin-top: 1.5rem;">
                For clinic access, go to <a href="../public/login.html" style="color: var(--primary); text-decoration: none;">Clinic Login</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Lab login successful! Redirecting to portal...');
        });
    </script>
</body>
</html>
