<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - EMR System</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reset-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }
        .reset-card {
            background: white;
            border-radius: var(--border-radius);
            padding: 2rem;
            box-shadow: var(--shadow-lg);
        }
        .reset-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        .reset-header p {
            color: var(--neutral-600);
            margin: 0;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--neutral-800);
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--neutral-300);
            border-radius: var(--border-radius);
            font-size: 1rem;
            transition: all 0.2s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }
        .btn-submit:hover {
            background-color: var(--primary-dark);
        }
        .btn-back {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--neutral-200);
            color: var(--neutral-900);
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn-back:hover {
            background-color: var(--neutral-300);
        }
        .alert {
            padding: 1rem;
            background-color: var(--primary-light);
            border: 1px solid var(--primary);
            border-radius: var(--border-radius);
            color: var(--primary);
            margin-bottom: 1rem;
            display: none;
        }
        .steps {
            background-color: var(--neutral-50);
            border-left: 4px solid var(--primary);
            padding: 1rem;
            border-radius: var(--border-radius);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: var(--neutral-700);
        }
        .steps ol {
            margin: 0;
            padding-left: 1.5rem;
        }
        .steps li {
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <div class="reset-header">
                <div class="logo">InferEMR</div>
                <p>Reset Your Password</p>
            </div>

            <div class="steps">
                <ol>
                    <li>Enter your email address</li>
                    <li>Check your email for reset link</li>
                    <li>Create a new password</li>
                </ol>
            </div>

            <div class="alert" id="successAlert"></div>

            <form id="resetForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="your@clinic.com" required>
                </div>

                <button type="submit" class="btn-submit">Send Reset Link</button>
                <a href="login.html" class="btn-back">Back to Login</a>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const alert = document.getElementById('successAlert');
            alert.textContent = 'Password reset link sent! Check your email.';
            alert.style.display = 'block';
        });
    </script>
</body>
</html>
