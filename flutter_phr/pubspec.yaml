name: phr_care
description: PHR Health - Personal Health Record by Infer Care (com.infer.care)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^9.1.1
  bloc: ^9.2.1
  equatable: ^2.0.8
  go_router: ^14.8.1
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4
  encrypt: ^5.0.3
  camera: ^0.10.5+9
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.12.0
  fl_chart: ^0.69.0
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  firebase_core: ^2.32.0
  firebase_messaging: ^14.9.4
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  pdfx: ^2.6.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  percent_indicator: ^4.2.3
  file_picker: ^8.0.7
  open_filex: ^4.7.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  share_plus: ^9.0.0
  intl: ^0.19.0
  table_calendar: ^3.1.3
  uuid: ^4.5.1
  health: ^12.0.0
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.3
  url_launcher: ^6.3.1
  flutter_dotenv: ^5.2.1
  json_annotation: ^4.9.0

dependency_overrides:
  shared_preferences_android: '>=2.3.0 <2.4.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
