events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  gzip on;
  gzip_types text/plain text/css text/javascript application/javascript application/json;
  gzip_min_length 1024;

  resolver 127.0.0.11 valid=30s;
  upstream backend { server phr_backend:3000; }

  # ── HTTP → HTTPS ───────────────────────────────────────────────
  server {
    listen 80;
    server_name inferapp.online www.inferapp.online api.inferapp.online opd.inferapp.online emr.inferapp.online;
    return 301 https://$host$request_uri;
  }

  # ── SSL shared params ──────────────────────────────────────────
  # All subdomains share one wildcard cert mounted at /etc/nginx/ssl
  ssl_certificate     /etc/nginx/ssl/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  # ── inferapp.online — public landing page ─────────────────────
  server {
    listen 443 ssl;
    server_name inferapp.online www.inferapp.online;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    root /var/www/web;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
      expires 1h;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
      expires 30d;
      add_header Cache-Control "public, max-age=2592000, immutable";
      access_log off;
    }
  }

  # ── api.inferapp.online — Node.js backend ─────────────────────
  server {
    listen 443 ssl;
    server_name api.inferapp.online;
    client_max_body_size 25M;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # Redirect old sub-paths to their dedicated domains
    location /opd { return 301 https://opd.inferapp.online$request_uri; }
    location /emr { return 301 https://emr.inferapp.online$request_uri; }

    location / {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }
  }

  # ── opd.inferapp.online — OPD / Clinic React SPA ──────────────
  server {
    listen 443 ssl;
    server_name opd.inferapp.online;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    root /var/www/opd;
    index index.html;

    # API calls from the React app → backend
    location /api/emr {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA — all other routes served from index.html
    location / {
      try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
      expires 30d;
      add_header Cache-Control "public, max-age=2592000, immutable";
      access_log off;
    }
  }

  # ── emr.inferapp.online — EMR static tool ─────────────────────
  server {
    listen 443 ssl;
    server_name emr.inferapp.online;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' data: https://cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self' https://api.inferapp.online" always;

    root /var/www/emr;
    index index.html;

    # API calls from the EMR tool → backend
    location /api/emr {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
