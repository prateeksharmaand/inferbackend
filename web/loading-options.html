<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infer Care — Loading Screen</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #08071a;
      overflow: hidden;
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Animated grid canvas ────────────────────────────────────── */
    #gridCanvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }

    /* ── Floating medical icons ──────────────────────────────────── */
    .med-float {
      position: fixed; font-size: 22px; opacity: 0;
      animation: medFloat 6s ease-in-out infinite;
      pointer-events: none; z-index: 1; filter: blur(.5px);
    }
    .med-f1  { top: 12%; left: 8%;   animation-delay: 0s;    font-size: 18px; }
    .med-f2  { top: 20%; right: 10%; animation-delay: 1.2s;  font-size: 20px; }
    .med-f3  { top: 55%; left: 5%;   animation-delay: 2.4s;  font-size: 16px; }
    .med-f4  { top: 70%; right: 8%;  animation-delay: 0.6s;  font-size: 18px; }
    .med-f5  { top: 82%; left: 18%;  animation-delay: 3.6s;  font-size: 14px; }
    .med-f6  { top: 35%; right: 6%;  animation-delay: 1.8s;  font-size: 16px; }
    .med-f7  { top: 88%; right: 20%; animation-delay: 2.8s;  font-size: 20px; }
    .med-f8  { top: 10%; left: 30%;  animation-delay: 4.2s;  font-size: 14px; }
    @keyframes medFloat {
      0%,100% { opacity: 0;    transform: translateY(0px) scale(.9); }
      20%,80% { opacity: .18;  transform: translateY(-8px) scale(1); }
      50%      { opacity: .28;  transform: translateY(-16px) scale(1.05); }
    }

    /* ── Cross pulse corners ─────────────────────────────────────── */
    .cross-corner {
      position: fixed; width: 28px; height: 28px; opacity: .25;
      animation: crossPulse 2s ease-in-out infinite;
    }
    .cross-corner::before, .cross-corner::after {
      content: ''; position: absolute; background: rgba(123,110,246,.7); border-radius: 2px;
    }
    .cross-corner::before { width: 4px; height: 100%; left: 50%; transform: translateX(-50%); }
    .cross-corner::after  { height: 4px; width: 100%; top: 50%; transform: translateY(-50%); }
    .cc-tl { top: 28px; left: 28px; }
    .cc-tr { top: 28px; right: 28px; }
    .cc-bl { bottom: 28px; left: 28px; }
    .cc-br { bottom: 28px; right: 28px; }
    @keyframes crossPulse {
      0%,100% { opacity: .15; transform: scale(1); }
      50%      { opacity: .4;  transform: scale(1.15); }
    }
    .cc-tr { animation-delay: .5s; }
    .cc-bl { animation-delay: 1s; }
    .cc-br { animation-delay: 1.5s; }

    /* ── Center card ─────────────────────────────────────────────── */
    .center-card {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 24px;
      padding: 44px 52px 36px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(123,110,246,.2);
      border-radius: 28px;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 80px rgba(58,46,212,.2), inset 0 1px 0 rgba(255,255,255,.06);
      min-width: 380px; max-width: 460px;
    }

    /* ── Logo ring ───────────────────────────────────────────────── */
    .logo-ring-wrap { position: relative; width: 96px; height: 96px; }
    .logo-ring-svg  { position: absolute; inset: 0; width: 100%; height: 100%; }
    .ring-track  { stroke: rgba(123,110,246,.12); }
    .ring-fill   {
      stroke: url(#rg); stroke-dasharray: 276; stroke-dashoffset: 60;
      transform-origin: center; transform: rotate(-90deg);
      animation: ringRotate 3s linear infinite;
      filter: drop-shadow(0 0 4px rgba(123,110,246,.6));
    }
    @keyframes ringRotate { to { transform: rotate(270deg); } }

    .logo-icon {
      position: absolute; inset: 0; margin: auto;
      width: 52px; height: 52px; border-radius: 15px;
      background: linear-gradient(135deg, #3A2ED4, #7B6EF6);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 800; color: #fff;
      box-shadow: 0 0 28px rgba(58,46,212,.7);
      animation: logoPulse 2s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%,100% { box-shadow: 0 0 20px rgba(58,46,212,.5); }
      50%      { box-shadow: 0 0 40px rgba(123,110,246,.8); }
    }
    .logo-pulse-ring {
      position: absolute; inset: -8px; border-radius: 22px;
      border: 1.5px solid rgba(123,110,246,.4);
      animation: pulseRingExpand 2s ease-out infinite;
    }
    @keyframes pulseRingExpand {
      0%   { transform: scale(1); opacity: .6; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    /* ── Brand name ──────────────────────────────────────────────── */
    .brand-wrap { text-align: center; }
    .brand-name {
      font-size: 22px; font-weight: 800; letter-spacing: -.3px; color: #fff;
      line-height: 1.2;
    }
    .brand-name span {
      background: linear-gradient(135deg, #7B6EF6, #B8AEFB);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .brand-sub { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 4px; letter-spacing: .4px; }

    /* ── ECG line ────────────────────────────────────────────────── */
    .ecg-wrap {
      width: 100%; height: 48px; position: relative; overflow: hidden;
    }
    .ecg-wrap::before, .ecg-wrap::after {
      content: ''; position: absolute; top: 0; width: 48px; height: 100%; z-index: 2;
    }
    .ecg-wrap::before { left: 0;  background: linear-gradient(to right, #08071a, transparent); }
    .ecg-wrap::after  { right: 0; background: linear-gradient(to left,  #08071a, transparent); }

    .ecg-svg {
      width: 900px; height: 48px; position: absolute; left: 0;
      animation: ecgScroll 2s linear infinite;
    }
    @keyframes ecgScroll { from { transform: translateX(0); } to { transform: translateX(-450px); } }

    /* Scanning dot on ECG -->*/
    .ecg-dot {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 8px; height: 8px; border-radius: 50%;
      background: #9C8FFA;
      box-shadow: 0 0 10px #7B6EF6, 0 0 20px rgba(123,110,246,.5);
      animation: dotScan 2s linear infinite;
      z-index: 3;
    }
    @keyframes dotScan {
      0%   { left: 0%;   opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 1; }
      100% { left: 100%; opacity: 0; }
    }

    /* ── Vitals row ──────────────────────────────────────────────── */
    .vitals-row {
      display: flex; align-items: center; gap: 0; width: 100%;
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
      border-radius: 12px; overflow: hidden;
    }
    .vital-cell {
      flex: 1; padding: 8px 0; text-align: center;
    }
    .vital-cell + .vital-cell { border-left: 1px solid rgba(255,255,255,.06); }
    .vital-val {
      font-size: 13px; font-weight: 700; color: #fff; display: flex;
      align-items: center; justify-content: center; gap: 4px;
      animation: vitalBlink 2s ease-in-out infinite;
    }
    .vital-val:nth-child(1) { animation-delay: 0s; }
    @keyframes vitalBlink {
      0%,100% { opacity: .8; }
      50%      { opacity: 1; }
    }
    .vital-label { font-size: 9px; color: rgba(255,255,255,.35); margin-top: 2px; letter-spacing: .4px; text-transform: uppercase; }
    .vital-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; animation: vDot 1s ease-in-out infinite alternate; }
    @keyframes vDot { from { opacity: .4; transform: scale(.8); } to { opacity: 1; transform: scale(1.2); } }

    /* ── Progress bar ────────────────────────────────────────────── */
    .prog-wrap { width: 100%; }
    .prog-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px; font-size: 11px; color: rgba(255,255,255,.4);
    }
    .prog-track {
      height: 4px; background: rgba(255,255,255,.08); border-radius: 10px; overflow: hidden;
    }
    .prog-fill {
      height: 100%; border-radius: 10px;
      background: linear-gradient(90deg, #3A2ED4, #7B6EF6, #B8AEFB);
      background-size: 200% 100%;
      animation: progGrow 3s ease-in-out infinite alternate, progShimmer 1.5s linear infinite;
    }
    @keyframes progGrow    { from { width: 15%; } to { width: 92%; } }
    @keyframes progShimmer { from { background-position: 100%; } to { background-position: 0%; } }

    .prog-msg {
      margin-top: 10px; font-size: 11px; color: rgba(255,255,255,.35);
      text-align: center; min-height: 16px;
      animation: fadeUpDown 1.8s ease-in-out infinite;
    }
    @keyframes fadeUpDown { 0%,100% { opacity: .4; } 50% { opacity: .9; } }

    /* ── Particle dots (DNA-style) ───────────────────────────────── */
    .dna-dots {
      position: fixed; inset: 0; pointer-events: none; z-index: 1;
    }
    .dna-dot {
      position: absolute; border-radius: 50%;
      background: radial-gradient(circle, rgba(123,110,246,.6), transparent);
      animation: dnaDrift linear infinite;
    }
  </style>
</head>
<body>

<!-- Grid canvas -->
<canvas id="gridCanvas"></canvas>

<!-- Medical floating icons -->
<div class="med-float med-f1">💊</div>
<div class="med-float med-f2">🩺</div>
<div class="med-float med-f3">🧬</div>
<div class="med-float med-f4">🔬</div>
<div class="med-float med-f5">🩻</div>
<div class="med-float med-f6">💉</div>
<div class="med-float med-f7">🫀</div>
<div class="med-float med-f8">🧪</div>

<!-- Cross corners -->
<div class="cross-corner cc-tl"></div>
<div class="cross-corner cc-tr"></div>
<div class="cross-corner cc-bl"></div>
<div class="cross-corner cc-br"></div>

<!-- Particle canvas -->
<canvas id="particleCanvas" style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;"></canvas>

<!-- Center card -->
<div class="center-card">

  <!-- Logo with rotating ring -->
  <div class="logo-ring-wrap">
    <svg class="logo-ring-svg" viewBox="0 0 100 100">
      <defs>
        <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#3A2ED4"/>
          <stop offset="100%" stop-color="#9C8FFA"/>
        </linearGradient>
      </defs>
      <circle cx="50" cy="50" r="44" fill="none" stroke-width="1.5" class="ring-track"/>
      <circle cx="50" cy="50" r="44" fill="none" stroke-width="2.5" class="ring-fill"/>
    </svg>
    <div class="logo-icon">
      I
      <div class="logo-pulse-ring"></div>
    </div>
  </div>

  <!-- Brand -->
  <div class="brand-wrap">
    <div class="brand-name">Infer <span>Care</span></div>
    <div class="brand-sub">AI-NATIVE CLINICAL MANAGEMENT</div>
  </div>

  <!-- ECG line -->
  <div class="ecg-wrap">
    <svg class="ecg-svg" viewBox="0 0 900 48" preserveAspectRatio="none">
      <defs>
        <linearGradient id="eg" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#3A2ED4" stop-opacity="0"/>
          <stop offset="15%"  stop-color="#7B6EF6"/>
          <stop offset="50%"  stop-color="#B8AEFB"/>
          <stop offset="85%"  stop-color="#7B6EF6"/>
          <stop offset="100%" stop-color="#3A2ED4" stop-opacity="0"/>
        </linearGradient>
        <filter id="eg-glow">
          <feGaussianBlur stdDeviation="1.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <line x1="0" y1="24" x2="900" y2="24" stroke="rgba(123,110,246,.1)" stroke-width="1"/>
      <!-- ECG repeating pattern (450px × 2 for seamless scroll) -->
      <polyline filter="url(#eg-glow)" fill="none" stroke="url(#eg)" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"
        points="
          0,24  25,24  35,24  44,9   50,39  55,3   61,45  67,24  80,24
          105,24 115,24 124,9 130,39 135,3 141,45 147,24 160,24
          185,24 195,24 204,9 210,39 215,3 221,45 227,24 240,24
          265,24 275,24 284,9 290,39 295,3 301,45 307,24 320,24
          345,24 355,24 364,9 370,39 375,3 381,45 387,24 400,24
          425,24 435,24 444,9 450,39 455,3 461,45 467,24 450,24

          450,24 475,24 485,24 494,9 500,39 505,3 511,45 517,24 530,24
          555,24 565,24 574,9 580,39 585,3 591,45 597,24 610,24
          635,24 645,24 654,9 660,39 665,3 671,45 677,24 690,24
          715,24 725,24 734,9 740,39 745,3 751,45 757,24 770,24
          795,24 805,24 814,9 820,39 825,3 831,45 837,24 850,24
          875,24 885,24 894,9 900,24
        "/>
    </svg>
    <div class="ecg-dot"></div>
  </div>

  <!-- Vitals row -->
  <div class="vitals-row">
    <div class="vital-cell">
      <div class="vital-val"><div class="vital-dot"></div> <span id="bpmVal">72</span></div>
      <div class="vital-label">Heart Rate</div>
    </div>
    <div class="vital-cell">
      <div class="vital-val">🩸 120/80</div>
      <div class="vital-label">Blood Pressure</div>
    </div>
    <div class="vital-cell">
      <div class="vital-val">🫁 98%</div>
      <div class="vital-label">SpO₂</div>
    </div>
    <div class="vital-cell">
      <div class="vital-val">🌡️ 37.1°</div>
      <div class="vital-label">Temperature</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="prog-wrap">
    <div class="prog-header">
      <span>Loading</span>
      <span id="pct">0%</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-msg" id="progMsg">Initialising AI engine…</div>
  </div>

</div>

<script>
/* ── Animated grid ────────────────────────────────────────── */
(function() {
  const canvas = document.getElementById('gridCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H, t = 0;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const cellSize = 48;
    const cols = Math.ceil(W / cellSize) + 2;
    const rows = Math.ceil(H / cellSize) + 2;
    const offX = (t * 12) % cellSize;
    const offY = (t *  6) % cellSize;

    for (let r = -1; r < rows; r++) {
      for (let c = -1; c < cols; c++) {
        const x = c * cellSize - offX;
        const y = r * cellSize - offY;
        // Distance from center
        const dx = (x + cellSize/2) - W/2;
        const dy = (y + cellSize/2) - H/2;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const maxDist = Math.sqrt((W/2)*(W/2) + (H/2)*(H/2));
        const fade = 1 - dist / maxDist;
        const pulse = 0.3 + 0.2 * Math.sin(t * 1.5 + dist * 0.01);
        const alpha = fade * pulse * 0.6;

        ctx.strokeStyle = `rgba(123,110,246,${alpha.toFixed(3)})`;
        ctx.lineWidth = 0.5;
        ctx.strokeRect(x, y, cellSize, cellSize);

        // Dot at intersection
        if (Math.random() < 0.002) {
          ctx.fillStyle = `rgba(156,143,250,${(alpha * 1.5).toFixed(3)})`;
          ctx.beginPath();
          ctx.arc(x, y, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
    t += 0.008;
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── Particle system ──────────────────────────────────────── */
(function() {
  const canvas = document.getElementById('particleCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H;
  const particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  for (let i = 0; i < 40; i++) {
    particles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 2.5 + 0.5,
      vx: (Math.random() - .5) * .4,
      vy: (Math.random() - .5) * .4,
      alpha: Math.random() * .5 + .1,
      hue: 240 + Math.random() * 40,
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W;
      if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H;
      if (p.y > H) p.y = 0;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue}, 80%, 70%, ${p.alpha})`;
      ctx.fill();
    });

    // Draw connecting lines between close particles
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if (d < 90) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(123,110,246,${(1 - d/90) * 0.15})`;
          ctx.lineWidth = 0.7;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── BPM animation ────────────────────────────────────────── */
(function() {
  const bpmEl = document.getElementById('bpmVal');
  const base = 72;
  setInterval(() => {
    bpmEl.textContent = base + Math.floor(Math.random() * 5 - 2);
  }, 1200);
})();

/* ── Progress messages ────────────────────────────────────── */
(function() {
  const msgs = [
    'Initialising AI engine…',
    'Loading patient modules…',
    'Connecting to clinic data…',
    'Syncing EMR records…',
    'Preparing prescription writer…',
    'Starting InferAssist…',
    'Almost ready…',
  ];
  let i = 0;
  const el = document.getElementById('progMsg');
  const pct = document.getElementById('pct');
  const fill = document.getElementById('progFill');

  setInterval(() => {
    i = (i + 1) % msgs.length;
    el.textContent = msgs[i];
    const p = Math.min(95, Math.round((i / msgs.length) * 100 + Math.random() * 15));
    pct.textContent = p + '%';
  }, 1800);
})();
</script>

</body>
</html>
